  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* -------------------------------------------------------
       Reset
    ------------------------------------------------------- */
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-font-smoothing: inherit;
    }

    html, body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5, h6, p, figure {
      margin: 0;
    }

    body, input, textarea, select, button {
      font-family: "Inter", sans-serif;
      font-size: 12px;
    }

    /* -------------------------------------------------------
       Page
    ------------------------------------------------------- */
    html {
      background-color: #0a0a0a;
      color: rgb(240, 240, 240);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* -------------------------------------------------------
       Hero
    ------------------------------------------------------- */
    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      overflow: visible;
    }

    /* -------------------------------------------------------
       Content (z above background)
    ------------------------------------------------------- */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
    }

    /* -------------------------------------------------------
       Badge
    ------------------------------------------------------- */
    .badge-wrap {
      opacity: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 16px;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.03em;
      color: rgb(240, 240, 240);
      opacity: 0;
      transform: translateY(100px) scale(0.9);
    }

    .badge-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .badge-icon svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* -------------------------------------------------------
       Text Group
    ------------------------------------------------------- */
    .text-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    h1 {
      font-family: "Instrument Serif", serif;
      font-weight: 400;
      font-style: italic;
      font-size: 60px;
      line-height: 110%;
      letter-spacing: 0;
      text-align: center;
      color: rgb(240, 240, 240);
      max-width: 520px;
    }

    h1 .inter {
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-style: normal;
      letter-spacing: -0.05em;
    }

    /* Each word wrapper for animation */
    .word {
      display: inline-block;
      opacity: 0;
      filter: blur(4px);
      transform: translateY(10px);
    }

    .subtitle {
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 16px;
      letter-spacing: -0.04em;
      line-height: 150%;
      text-align: center;
      color: rgba(255, 255, 255, 0.56);
      max-width: 302px;
    }

    /* -------------------------------------------------------
       Form
    ------------------------------------------------------- */
    .form-wrap {
      opacity: 0;
    }

    .form-container {
      position: relative;
      width: 395px;
    }

    .form-container input[type="email"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      outline: none;
      border: none;
      padding: 16px 136px 16px 16px;
      border-radius: 8px;
      font-family: "Inter", sans-serif;
      font-weight: 400;
      font-size: 14px;
      font-style: normal;
      letter-spacing: -0.04em;
      line-height: 1.2em;
      background: rgba(10, 10, 10, 0.56);
      color: rgb(255, 255, 255);
      box-shadow:
        inset 0 0 0 0px rgba(255, 255, 255, 0.1),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    .form-container input[type="email"]::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-wrap {
      position: absolute;
      top: 5px;
      right: 5px;
      bottom: 5px;
    }

    .form-container input[type="submit"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 100%;
      outline: none;
      border: none;
      cursor: pointer;
      padding: 0 16px;
      border-radius: 3px;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: 14px;
      font-style: normal;
      letter-spacing: -0.04em;
      line-height: 1em;
      background: rgb(240, 240, 240);
      color: rgb(10, 10, 10);
      box-shadow: none;
      z-index: 1;
    }

    .form-container input[type="submit"]:hover {
      background: rgb(225, 225, 225);
    }

    /* -------------------------------------------------------
       Background Decorative Layer
    ------------------------------------------------------- */
    .bg-layer {
      position: absolute;
      bottom: -100px;
      left: calc(50% - 600px);
      width: 1200px;
      height: 800px;
      overflow: hidden;
      z-index: 0;
      background-color: #0a0a0a;
    }

    /* Animated mesh gradient (replaces Framer canvas) */
    .bg-mesh {
      position: absolute;
      inset: 0;
      opacity: 0.5;
      background:
        radial-gradient(ellipse at 25% 60%, rgba(120, 80, 200, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 50%, rgba(60, 100, 180, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(80, 40, 150, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 40%, rgba(40, 80, 160, 0.25) 0%, transparent 50%);
      animation: mesh-drift 20s ease-in-out infinite alternate;
    }

    @keyframes mesh-drift {
      0%   { transform: scale(1)   translate(0, 0); }
      33%  { transform: scale(1.1) translate(-20px, 10px); }
      66%  { transform: scale(0.95) translate(15px, -10px); }
      100% { transform: scale(1.05) translate(-10px, 15px); }
    }

    /* Glow / Arc container */
    .bg-glow {
      position: absolute;
      inset: 0;
    }

    /* Star particles canvas */
    .bg-stars {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Bottom arc (outer gradient) */
    .bg-arc-outer {
      position: absolute;
      bottom: -662px;
      left: -443px;
      right: -443px;
      height: 955px;
      border-radius: 100%;
      background: linear-gradient(#fff 0%, #0a0a0a00 100%);
    }

    /* Bottom arc (inner ellipse) */
    .bg-arc-inner {
      position: absolute;
      bottom: -668px;
      left: -521px;
      right: -521px;
      height: 955px;
      border-radius: 100%;
      aspect-ratio: 2.34682;
      background-color: #0a0a0a;
      box-shadow: inset 0 2px 20px #fff, 0 -10px 50px 1px #ffffff7d;
    }

    /* Radial glow spot */
    .bg-radial {
      position: absolute;
      bottom: 265px;
      left: calc(47.9167% - 393.5px);
      width: 787px;
      height: 111px;
      filter: blur(57px);
      background: radial-gradient(50% 50%, #ffffff80 0%, #0a0a0a00 100%);
      overflow: hidden;
    }

    /* Backdrop blur layer */
    .bg-backdrop {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 588px;
      backdrop-filter: blur(80px);
      -webkit-backdrop-filter: blur(80px);
      background: linear-gradient(#0a0a0a 0%, #0000 100%);
    }

    /* Top fade */
    .bg-top-fade {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(#0a0a0a 0%, #0a0a0a00 100%);
    }

    /* Left edge fade */
    .bg-edge-left {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 100%;
      background: linear-gradient(90deg, #0a0a0a 0%, #0a0a0a00 100%);
    }

    /* Right edge fade */
    .bg-edge-right {
      position: absolute;
      top: 0;
      right: 0;
      width: 600px;
      height: 100%;
      background: linear-gradient(270deg, #0a0a0a 0%, #0a0a0a00 100%);
    }

    /* -------------------------------------------------------
       Footer
    ------------------------------------------------------- */
    footer {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      width: 100%;
      max-width: 1440px;
      padding: 24px 64px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background-color: #0a0a0a;
    }

    .footer-links {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: min-content;
    }

    .footer-item {
      font-family: "Inter", sans-serif;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: -0.02em;
      color: rgb(153, 153, 153);
      white-space: nowrap;
    }

    .footer-item a {
      color: #fff;
      text-decoration: none;
      transition: color 0.3s cubic-bezier(0.44, 0, 0.56, 1);
    }

    .footer-item a:hover {
      color: rgba(255, 255, 255, 0.56);
    }

    .footer-sep {
      color: rgb(153, 153, 153);
      font-size: 12px;
      user-select: none;
    }

    /* -------------------------------------------------------
       Responsive -- Tablet (810px - 1199px)
    ------------------------------------------------------- */
    @media (min-width: 810px) and (max-width: 1199px) {
      .bg-layer {
        bottom: 0;
      }

      footer {
        max-width: 810px;
        padding: 24px 32px;
      }
    }

    /* -------------------------------------------------------
       Responsive -- Mobile (<=809px)
    ------------------------------------------------------- */
    @media (max-width: 809px) {
      .hero {
        justify-content: flex-start;
        gap: 36px;
        padding: 164px 32px 150px;
      }

      .content {
        max-width: 390px;
        gap: 16px;
      }

      h1 {
        font-size: 40px;
        max-width: unset;
        text-wrap: balance;
      }

      .subtitle {
        max-width: 314px;
      }

      .form-container {
        width: 304px;
      }

      .bg-layer {
        bottom: 0;
      }

      footer {
        max-width: 390px;
        gap: 42px;
        padding: 24px 32px;
      }

      .footer-links {
        flex-direction: column;
        flex-wrap: wrap;
      }

      .footer-sep {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- =====================================================
       Motion.dev + Animations
  ====================================================== -->
  <script src="https://cdn.jsdelivr.net/npm/motion@latest/dist/motion.js"></script>
  <script>
    (function () {
      var animate = Motion.animate;

      /* Helper: spring options for motion.dev WAAPI */
      function sp(stiffness, damping, delay) {
        return { type: 'spring', stiffness: stiffness, damping: damping, mass: 1, delay: delay };
      }

      /* Badge pill: slides up 100px, scales 0.9 -> 1 */
      animate('#badge',
        { opacity: [0, 1], y: [100, 0], scale: [0.9, 1] },
        sp(186, 30, 0.1)
      );

      /* Badge container: simple fade in */
      animate('#badge-wrap', { opacity: [0, 1] }, sp(400, 100, 1));

      /* Form: simple fade in */
      animate('#form-wrap', { opacity: [0, 1] }, sp(400, 100, 1));

      /* Word-by-word reveal: H1 + subtitle */
      var words = document.querySelectorAll('.word');
      words.forEach(function (word, i) {
        animate(word,
          { opacity: [0, 1], filter: ['blur(4px)', 'blur(0px)'], y: [10, 0] },
          sp(400, 40, 1.0 + (i * 0.06))
        );
      });
    })();

    /* ---- Animated star particles ---- */
    (function () {
      var canvas = document.getElementById('bg-stars');
      var ctx = canvas.getContext('2d');
      var stars = [];
      var count = 80;

      function initStars() {
        var hero = canvas.parentElement;
        canvas.width = hero.clientWidth;
        canvas.height = hero.clientHeight;
        stars = [];
        for (var i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.3,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 0.003 + 0.001
          });
        }
      }
      initStars();
      window.addEventListener('resize', initStars);

      function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          var alpha = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }
      requestAnimationFrame(draw);
    })();
  </script>

    document.querySelectorAll('form').forEach(function(form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        e.stopImmediatePropagation();
        var input = form.querySelector('input[type="email"]');
        var btn = form.querySelector('input[type="submit"]');
        if (!input || !btn) return;

        var email = input.value.trim();
        input.setAttribute('pattern', '[^\\s@]+@[^\\s@]+\\.[^\\s@]+');
        input.setAttribute('title', 'Please enter a valid email (e.g. name@example.com)');
        if (!email || !input.checkValidity()) {
          input.reportValidity();
          return;
        }

        var originalText = btn.value;
        btn.value = 'Joining...';
        btn.disabled = true;

        fetch(SUPABASE_URL + '/rest/v1/waitlist', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ email: email })
        }).then(function(res) {
          if (res.ok) {
            btn.value = 'You\'re In!';
            input.value = '';
          } else if (res.status === 409) {
            btn.value = 'Already Joined!';
          } else {
            btn.value = 'Try Again';
            btn.disabled = false;
          }
        }).catch(function() {
          btn.value = 'Try Again';
          btn.disabled = false;
        });
      });
    });
  </script>
